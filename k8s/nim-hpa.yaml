# GPU-aware Horizontal Pod Autoscaler
# Scales NIM replicas based on GPU compute utilization from DCGM Exporter
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nim-llm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nim-llm
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # React fast to traffic spikes
    scaleDown:
      stabilizationWindowSeconds: 300  # Cool down slowly to save cost churn
  metrics:
    # Primary: GPU compute utilization (from DCGM via Prometheus Adapter)
    - type: Pods
      pods:
        metric:
          name: DCGM_FI_DEV_GPU_UTIL
        target:
          type: AverageValue
          averageValue: "70"  # Scale up when GPU > 70% utilized
