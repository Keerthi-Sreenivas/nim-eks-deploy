name: Kiro Infrastructure Review
on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'k8s/**'
      - 'scripts/**'

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash
      - name: Review infrastructure changes
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          kiro-cli chat --no-interactive --trust-tools=read,grep \
            "Review all files in this repository for security and configuration issues. Check: \
             1. Terraform: overly permissive network access, public endpoint settings, encryption at rest \
             2. K8s: GPU tolerations match Terraform node taints, HPA metrics are valid, ports are consistent \
             3. Scripts: secret handling, Helm config correctness, error handling \
             4. Cross-file consistency between terraform/, k8s/, and scripts/"
